<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Register | Secure Auth System</title>

	<!-- Bootstrap 5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Google Font -->
	<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

	<style>
		body {
			font-family: 'Poppins', sans-serif;
			background: linear-gradient(135deg, #667eea, #764ba2);
			height: 100vh;
		}

		.card {
			border-radius: 20px;
			backdrop-filter: blur(12px);
			background: rgba(255, 255, 255, 0.15);
			color: white;
		}

		.form-control {
			border-radius: 10px;
		}

		.btn-gradient {
			border: none;
			border-radius: 25px;
			background: linear-gradient(to right, #ff7e5f, #feb47b);
			color: white;
			font-weight: 500;
		}

		.btn-gradient:hover {
			opacity: 0.9;
		}

		.title {
			font-size: 28px;
			font-weight: bold;
		}

		.link {
			color: #ffffff;
			font-weight: bold;
		}

		.link:hover {
			text-decoration: underline;
		}

		.navbar {
			background: rgba(0,0,0,0.6);
		}
	</style>
</head>

<body>

<!-- 🔐 NAVBAR -->
<nav class="navbar navbar-dark fixed-top">
	<div class="container">
		<a class="navbar-brand" th:href="@{/}">
			🔐 Secure Auth System
		</a>
	</div>
</nav>

<!-- FORM -->
<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

	<div class="card shadow-lg p-4" style="width: 420px;">

		<h2 class="text-center title">Create Account</h2>
		<hr>

		<!-- SUCCESS -->
		<div th:if="${param.success}" class="alert alert-success text-center">
			Registration successful 🎉
		</div>

		<!-- ERROR -->
		<div th:if="${param.error}" class="alert alert-danger text-center">
			Email already registered
		</div>

		<form th:action="@{/registration}" method="post" th:object="${user}">

			<div class="mb-3">
				<label>First Name</label>
				<input class="form-control" th:field="*{firstName}" required>
			</div>

			<div class="mb-3">
				<label>Last Name</label>
				<input class="form-control" th:field="*{lastName}" required>
			</div>

			<div class="mb-3">
				<label>Email</label>
				<input type="email" class="form-control" th:field="*{email}" required>
			</div>

			<div class="mb-3">
				<label>Password</label>
				<input type="password" class="form-control" th:field="*{password}" required>
			</div>

			<div class="d-grid mt-3">
				<button type="submit" class="btn btn-gradient">
					Register
				</button>
			</div>

		</form>

		<div class="text-center mt-3">
			<p>
				Already have an account?
				<a th:href="@{/login}" class="link">Login here</a>
			</p>
		</div>

	</div>

</div>

</body>
</html>
