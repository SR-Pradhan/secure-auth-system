<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            height: 100vh;
            color: #e2e8f0;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
        }

        .btn-soft {
            background: linear-gradient(to right, #6366f1, #818cf8);
            border-radius: 25px;
            color: white;
            border: none;
        }

        .btn-soft:hover {
            opacity: 0.9;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
        }

        .username {
            color: #a5b4fc;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card p-5 text-center shadow-lg" style="width:420px;">

        <h2 class="title">🎉 Login Successful</h2>

        <p class="mt-3">
            Welcome,
            <span class="username" th:text="${#authentication.name}"></span>
        </p>

        <hr style="border-color: rgba(255,255,255,0.2);">

        <p>You are now inside your dashboard.</p>

        <div class="mt-4 d-grid gap-2">
            <button class="btn btn-soft">View Profile</button>
            <button class="btn btn-soft">Settings</button>
            <a href="/logout" class="btn btn-danger rounded-pill">Logout</a>
        </div>

    </div>

</div>

</body>
</html>
